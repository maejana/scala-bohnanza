name: Scala CI/CD

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      # Checkout Code
      - uses: actions/checkout@v2
      
      # Set up JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      # Compile Project
      - name: Compile
        run: sbt compile

      # Run Tests
      - name: Run Tests
        run: sbt test

      # Coverage Report for Coveralls
      - name: Coveralls Coverage
        uses: coverallsapp/github-action@v2.3.4
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
